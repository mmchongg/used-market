name: PHP CI

on:
  push:
    branches:
      - main

jobs:
  php-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: PHP 설치
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2

      - name: PHP 문법 검사
        run: |
          find . -name "*.php" -print0 | while IFS= read -r -d '' file; do
            php -l "$file"
          done
